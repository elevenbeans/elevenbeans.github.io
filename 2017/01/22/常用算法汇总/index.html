            <p>发布冻结，虽然马上过年了，还是不能闲着。<br>复习一下计算机基础。<br>来几个小算法～  </p>
<h2 id="冒泡排序"><a href="#冒泡排序" class="headerlink" title="冒泡排序"></a>冒泡排序</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-attr">bubbleSort</span>: <span class="hljs-keyword">function</span>(<span class="hljs-params">arr</span>)&#123;<br>    <span class="hljs-keyword">for</span>(<span class="hljs-keyword">var</span> i = <span class="hljs-number">0</span>; i &lt; arr.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>; i++)&#123;<br>        <span class="hljs-keyword">for</span>(<span class="hljs-keyword">var</span> j = <span class="hljs-number">1</span>; j &lt; arr.<span class="hljs-property">length</span> - <span class="hljs-number">2</span>; j++)&#123;<br>            <span class="hljs-keyword">if</span>(arr[j-<span class="hljs-number">1</span>] &gt; arr[j])&#123;<br>                temp = arr[j];<br>                arr[j] = arr[j-<span class="hljs-number">1</span>];<br>                arr[j-<span class="hljs-number">1</span>] = temp;<br>            &#125;<br>        &#125;<br>    &#125;<br>    <span class="hljs-keyword">return</span> arr;<br>&#125;,<br></code></pre></td></tr></table></figure>

<h2 id="快速排序"><a href="#快速排序" class="headerlink" title="快速排序"></a>快速排序</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs js">    <span class="hljs-attr">quickSort</span>: <span class="hljs-keyword">function</span>(<span class="hljs-params">arr</span>)&#123;<br>        <span class="hljs-keyword">if</span>(arr.<span class="hljs-property">length</span> &lt; <span class="hljs-number">2</span>) <span class="hljs-keyword">return</span> arr;<br>        <span class="hljs-keyword">var</span> middleIndex = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>(arr.<span class="hljs-property">length</span> / <span class="hljs-number">2</span>);<br>        <span class="hljs-keyword">var</span> middleValue = arr.<span class="hljs-title function_">splice</span>(middleIndex,<span class="hljs-number">1</span>)[<span class="hljs-number">0</span>];<br><br>        <span class="hljs-keyword">var</span> left = [];<br>        <span class="hljs-keyword">var</span> right = [];<br>        <span class="hljs-keyword">for</span>(<span class="hljs-keyword">var</span> i = <span class="hljs-number">0</span>; i &lt; arr.<span class="hljs-property">length</span>; i++)&#123;<br>            <span class="hljs-keyword">if</span>(arr[i] &lt; middleValue)&#123;<br>                left.<span class="hljs-title function_">push</span>(arr[i]);<br>            &#125;<span class="hljs-keyword">else</span>&#123;<br>                right.<span class="hljs-title function_">push</span>(arr[i]);<br>            &#125;<br>        &#125;<br>        <span class="hljs-keyword">return</span> <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">quickSort</span>(left).<span class="hljs-title function_">concat</span>(middleValue,<span class="hljs-variable language_">this</span>.<span class="hljs-title function_">quickSort</span>(right));<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="插入排序"><a href="#插入排序" class="headerlink" title="插入排序"></a>插入排序</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-title function_">insertionSort</span>(<span class="hljs-params">arr</span>) &#123;<br><span class="hljs-keyword">var</span> len = arr.<span class="hljs-property">length</span>;<br><span class="hljs-keyword">var</span> preIndex, current;<br><span class="hljs-keyword">for</span> (<span class="hljs-keyword">var</span> i = <span class="hljs-number">1</span>; i &lt; len; i++) &#123;<br>    preIndex = i - <span class="hljs-number">1</span>;<br>    current = arr[i];<br>    <span class="hljs-keyword">while</span>(preIndex &gt;= <span class="hljs-number">0</span> &amp;&amp; arr[preIndex] &gt; current) &#123; <span class="hljs-comment">// 找位置</span><br>        arr[preIndex + <span class="hljs-number">1</span>] = arr[preIndex];<br>        preIndex--;<br>    &#125;<br>    arr[preIndex + <span class="hljs-number">1</span>] = current; <span class="hljs-comment">// 插入</span><br>&#125;<br><span class="hljs-keyword">return</span> arr;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="希尔排序"><a href="#希尔排序" class="headerlink" title="希尔排序"></a>希尔排序</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-attr">shellSort</span>: <span class="hljs-keyword">function</span>(<span class="hljs-params">arr</span>) &#123;<br>    <span class="hljs-keyword">var</span> len = arr.<span class="hljs-property">length</span>;<br><span class="hljs-keyword">for</span> (<span class="hljs-keyword">var</span> fraction = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>(len / <span class="hljs-number">2</span>); fraction &gt; <span class="hljs-number">0</span>;<br>        fraction = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>(fraction / <span class="hljs-number">2</span>)) &#123;<br>  <span class="hljs-keyword">for</span> (<span class="hljs-keyword">var</span> i = fraction; i &lt; len; i++) &#123;<br>    <span class="hljs-keyword">for</span> (<span class="hljs-keyword">var</span> j = i - fraction; j &gt;= <span class="hljs-number">0</span> &amp;&amp;<br>            arr[j] &gt; arr[fraction + j]; j -= fraction) &#123;<br>      <span class="hljs-keyword">var</span> temp = arr[j];<br>      arr[j] = arr[fraction + j];<br>    arr[fraction + j] = temp;<br>    &#125;<br>  &#125;<br>&#125;<br>  <span class="hljs-keyword">return</span> arr;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="选择排序"><a href="#选择排序" class="headerlink" title="选择排序"></a>选择排序</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-attr">selectionSort</span>: <span class="hljs-keyword">function</span>(<span class="hljs-params">arr</span>)&#123;<br>    <span class="hljs-keyword">var</span> minIndex, temp;<br>    <span class="hljs-keyword">for</span>(<span class="hljs-keyword">var</span> n = <span class="hljs-number">0</span>; n &lt; arr.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>; n++)&#123;<br>        minIndex = n;<br>        <span class="hljs-keyword">for</span>(<span class="hljs-keyword">var</span> i = n + <span class="hljs-number">1</span>; i &lt; arr.<span class="hljs-property">length</span>; i++ )&#123;<br>          <span class="hljs-keyword">if</span>(arr[i] &lt; arr[minIndex])&#123;<br>              minIndex = i;<br>          &#125;<br>      &#125;;<br>        temp = arr[minIndex];<br>        arr[minIndex] = arr[n];<br>        arr[n] = temp;<br>    &#125;<br>    <span class="hljs-keyword">return</span> arr;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="二分查找"><a href="#二分查找" class="headerlink" title="二分查找"></a>二分查找</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-title function_">binarySearch</span>(<span class="hljs-params">data, dest</span>)&#123;<br>  <span class="hljs-keyword">var</span> h = data.<span class="hljs-property">length</span> - <span class="hljs-number">1</span>,<br>      l = <span class="hljs-number">0</span>;<br>  <span class="hljs-keyword">while</span>(l &lt;= h)&#123;<br>    <span class="hljs-keyword">var</span> m = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">floor</span>((h + l) / <span class="hljs-number">2</span>);<br>  <span class="hljs-keyword">if</span>(data[m] == dest)&#123;<br>  <span class="hljs-keyword">return</span> m;<br>&#125;<br>  <span class="hljs-keyword">if</span>(dest &gt; data[m])&#123;<br>  l = m + <span class="hljs-number">1</span>;<br>&#125;<span class="hljs-keyword">else</span>&#123;<br>  h = m - <span class="hljs-number">1</span>;<br>&#125;<br>&#125;<br>  <span class="hljs-keyword">return</span> <span class="hljs-literal">false</span>;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="递归"><a href="#递归" class="headerlink" title="递归"></a>递归</h2><figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-title function_">factorial</span>(<span class="hljs-params">num</span>)&#123;<br>  <span class="hljs-keyword">if</span>(num == <span class="hljs-number">0</span>)&#123;<br>    <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>;<br>  &#125;<span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(num == <span class="hljs-number">1</span>)&#123;<br>    <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>;<br>  &#125;<span class="hljs-keyword">else</span>&#123;<br>    <span class="hljs-keyword">return</span> num * <span class="hljs-variable language_">this</span>.<span class="hljs-title function_">factorial</span>(num-<span class="hljs-number">1</span>);<br>  &#125;<br>&#125;<br></code></pre></td></tr></table></figure>
