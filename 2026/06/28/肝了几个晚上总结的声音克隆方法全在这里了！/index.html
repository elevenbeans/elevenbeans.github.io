  <script>
  (function(){
    var SLUG = 'voice-clone';
    var paywall = document.querySelector('.paid-paywall');
    var contentDiv = document.getElementById('paid-content');
    var form = document.getElementById('paid-form');
    var codeInput = document.getElementById('paid-code');
    var errorP = document.getElementById('paid-error');
    var loadingP = document.getElementById('paid-loading');

    function showContent(html) {
      if (paywall) paywall.style.display = 'none';
      contentDiv.innerHTML = html;
      contentDiv.style.display = 'block';
    }

    function showError(msg) {
      loadingP.style.display = 'none';
      errorP.textContent = msg;
      errorP.style.display = 'block';
    }

    function redeem(code) {
      loadingP.style.display = 'block';
      errorP.style.display = 'none';
      fetch('/api/redeem', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, slug: SLUG })
      }).then(function(r) { return r.json(); }).then(function(res) {
        loadingP.style.display = 'none';
        if (res.success) {
          showContent(res.content);
        } else {
          showError(res.error || '邀请码无效');
        }
      }).catch(function() {
        loadingP.style.display = 'none';
        showError('网络错误，请稍后重试');
      });
    }

    function checkSession() {
      fetch('/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: SLUG })
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (res.success) showContent(res.content);
      }).catch(function() {});
    }

    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var code = codeInput.value.trim();
        if (!code) { showError('请输入邀请码'); return; }
        redeem(code);
      });
    }

    checkSession();
  })();
  </script>
